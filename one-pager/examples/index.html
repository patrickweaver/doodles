        if (devEnv) showAlert("Test alert");
        if (window.screen.width < 900) {
          showAlert(ALERT_PHONE_SCREEN_SIZE);
        }
        window.addEventListener("beforeunload", function (e) {
          if (!devEnv) {
            e.preventDefault();
          }
        });
      }
      function localEditingMode() {
        console.log("Local editing mode enabled");
        boilerplateSetup();
        activateElementListeners();
        activateAnchorListeners();
        enableLocalControls();
        activatePageListeners();
      }
      function boilerplateSetup() {
        document.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return;
            const range = selection.getRangeAt(0);
            range.deleteContents();
            const br = createElement({ tag: ElementTag.BR });
            range.insertNode(br);
            range.setStartAfter(br);
            range.setEndAfter(br);
            selection.removeAllRanges();
            selection.addRange(range);
          }
        });
      }
      const isLocal =
        window.location.protocol === "file:" ||
        (window.location.hostname === "doodles.patrickweaver.net" &&
          window.location.pathname === "/one-pager/") ||
        isDevEnv() ||
        window.navigator.userAgent.includes("jsdom");
      if (isLocal) localEditingMode();
